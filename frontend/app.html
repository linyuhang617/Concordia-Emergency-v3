<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concordia Emergency</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles/web.css">
</head>
<body class="app-body">

  <!-- Nav Bar -->
  <nav class="nav-bar">
    <a class="nav-brand" href="app.html">
      <div class="nav-brand-icon">C</div>
      Concordia Emergency
    </a>

    <div class="nav-search-wrap">
      <input type="text" id="ds-input" placeholder="Search buildings or address (e.g. EV, Hall)…" autocomplete="off">
      <div class="nav-search-btns">
        <button id="ds-btn"   type="button">Go</button>
        <button id="ds-clear" type="button" style="display:none">✕</button>
      </div>
      <ul id="ds-suggestions"></ul>
    </div>

    <div class="nav-right">
      <span id="ds-status"></span>
      <button class="nav-icon-btn" id="crisis-btn" type="button" title="Crisis Mode">⚠️</button>
      <a class="nav-avatar" id="profile-initial" href="profile.html" title="Profile">?</a>
    </div>
  </nav>

  <!-- App Layout -->
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Campus Alerts</div>
        <div class="seg-control">
          <button class="seg-item active" data-f="all"      type="button">All</button>
          <button class="seg-item"        data-f="active"   type="button">Active</button>
          <button class="seg-item"        data-f="review"   type="button">Review</button>
          <button class="seg-item"        data-f="resolved" type="button">Resolved</button>
        </div>
      </div>
      <div class="sidebar-stats" id="alert-summary">Loading…</div>
      <div id="alert-list"></div>
      <div class="sidebar-report-btn">
        <a href="report.html">＋ Report Hazard</a>
      </div>
    </aside>

    <!-- Map -->
    <div class="map-container">
      <div id="map"></div>
      <div id="offline-banner">📵 Offline — showing campus buildings only</div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data/building.js"></script>
  <script src="scripts/api.js"></script>
  <script src="scripts/auth.js"></script>
  <script src="scripts/map.js"></script>
</body>
</html>
