<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concordia Safety</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="styles/ios.css">
<style>
/* Nav bar with logo + actions */
.nav-bar { justify-content: space-between }
.nav-bar-inner {
  width: 100%;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #fff;
}
.nav-logo-icon {
  width: 28px;
  height: 28px;
  background: rgba(255,255,255,0.2);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: -0.5px;
}
.nav-logo-text {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.41px;
}
.nav-actions { display: flex; gap: 6px }
.nav-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: none;
  color: #fff;
}
.nav-btn:active { opacity: 0.6 }

/* Map */
#map {
  position: absolute;
  top: 52px;
  left: 0; right: 0;
  height: 280px;
  z-index: 1;
}

/* Scrollable content below map */
.content {
  position: absolute;
  top: 332px;
  bottom: 83px;
  left: 0; right: 0;
  z-index: 50;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* Large title */
.large-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: 0.37px;
  color: var(--label);
  padding: 8px 20px 0;
}
.large-title-sub {
  font-size: 13px;
  color: var(--tertiary-label);
  padding: 2px 20px 10px;
  letter-spacing: -0.08px;
}

/* Segmented control */
.segmented {
  display: flex;
  margin: 0 16px 12px;
  background: var(--fill);
  border-radius: 9px;
  padding: 2px;
  height: 32px;
}
.seg-item {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--label);
  border-radius: 7px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  letter-spacing: -0.08px;
  border: none;
  background: none;
  font-family: var(--sf);
}
.seg-item.active {
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0.5px 1px rgba(0,0,0,0.04);
}
.seg-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  margin-left: 4px;
  flex-shrink: 0;
}

/* Alert list row overrides */
.content .list-row:not(:last-child)::after { left: 60px }
.row-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.row-dot.red { background: var(--red) }
.row-dot.orange { background: var(--orange) }
.row-dot.green { background: var(--green) }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--tertiary-label);
  font-size: 15px;
  letter-spacing: -0.24px;
}

/* Alert marker on map */
.alert-marker-js {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  border: 2px solid #fff;
  box-shadow: 0 1px 6px rgba(0,0,0,0.3);
}

/* Offline banner */
.offline-banner {
  display: none;
  position: absolute;
  top: 304px;
  left: 0; right: 0;
  z-index: 300;
  background: var(--orange);
  color: #fff;
  text-align: center;
  padding: 6px 16px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.08px;
}

/* Leaflet overrides */
.leaflet-popup-content-wrapper {
  border-radius: 14px !important;
  box-shadow: 0 8px 28px rgba(0,0,0,0.12) !important;
  border: none !important;
  font-family: var(--sf) !important;
}
.leaflet-popup-content {
  margin: 12px 14px !important;
  font-size: 15px !important;
  line-height: 1.4 !important;
}
.leaflet-popup-tip { box-shadow: none !important }
.leaflet-control-zoom { display: none !important }

/* Search suggestions */
.ds-suggestion-item {
  padding: 10px 14px;
  font-size: 14px;
  color: var(--label);
  cursor: pointer;
  border-bottom: 0.5px solid var(--separator);
  letter-spacing: -0.15px;
  font-family: var(--sf);
}
.ds-suggestion-item:last-child { border-bottom: none }
.ds-suggestion-item:active { background: rgba(0,0,0,0.04) }
</style>
</head>
<body>
<div class="device" style="background:var(--bg)">

  <!-- Nav Bar -->
  <div class="nav-bar">
    <div class="nav-bar-inner">
      <div class="nav-logo">
        <div class="nav-logo-icon">C</div>
        <span class="nav-logo-text">Concordia Safety</span>
      </div>
      <div class="nav-actions">
        <button class="nav-btn" type="button" id="crisis-btn" title="Crisis Mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </button>
        <button class="nav-btn" type="button" id="profile-initial" style="font-weight:600;font-size:15px;letter-spacing:-0.5px" onclick="window.location.href='profile.html'"></button>
      </div>
    </div>
  </div>

  <!-- Offline Banner -->
  <div class="offline-banner" id="offline-banner">📡 Offline Mode — Using cached data</div>

  <!-- Map -->
  <div id="map"></div>
  <div id="map-search" style="position:absolute;top:62px;left:10px;right:10px;z-index:200">
    <div style="display:flex;gap:6px">
      <input id="ds-input" type="text" placeholder="Search destination..." autocomplete="off" style="flex:1;height:36px;background:rgba(255,255,255,0.88);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-radius:10px;border:none;outline:none;padding:0 12px;font-size:15px;font-family:var(--sf);color:var(--label);letter-spacing:-0.24px">
      <button id="ds-btn" type="button" style="height:36px;padding:0 14px;background:var(--crimson);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:var(--sf);cursor:pointer;letter-spacing:-0.24px">Go</button>
      <button id="ds-clear" type="button" style="height:36px;width:36px;background:rgba(255,255,255,0.88);border:none;border-radius:10px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999">✕</button>
    </div>
    <ul id="ds-suggestions" style="display:none;list-style:none;margin:4px 0 0;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.12);overflow:hidden;max-height:200px;overflow-y:auto"></ul>
    <div id="ds-status" style="font-size:12px;color:#999;padding:4px 4px 0;letter-spacing:-0.08px"></div>
  </div>

  <!-- Content: Alert List -->
  <div class="content">
    <div class="large-title">Alerts</div>
    <div class="large-title-sub" id="alert-summary">Loading...</div>

    <div class="segmented">
      <button class="seg-item active" type="button" data-f="all">All</button>
      <button class="seg-item" type="button" data-f="active">Active<span class="seg-dot" style="background:var(--red)"></span></button>
      <button class="seg-item" type="button" data-f="review">Review</button>
      <button class="seg-item" type="button" data-f="resolved">Resolved</button>
    </div>

    <div class="inset-group" id="alert-list">
      <div class="empty-state">Loading alerts...</div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <a class="tab active" href="app.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="var(--tint)" stroke="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
      <span class="tab-label">Map</span>
    </a>
    <div class="tab-report">
      <a href="report.html">
        <div class="tab-report-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
      </a>
      <span class="tab-label" style="color:#999;margin-top:4px;display:block;text-align:center">Report</span>
    </div>
    <a class="tab" href="profile.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="tab-label">Profile</span>
    </a>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="scripts/api.js"></script>
<script src="scripts/auth.js"></script>
<script src="data/building.js"></script>
<script src="scripts/map.js"></script>
</body>
</html>
