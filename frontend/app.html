<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concordia Emergency</title>
  <link rel="stylesheet" href="styles/web.css">
</head>
<body>
<script src="scripts/api.js"></script>
<script src="scripts/auth.js"></script>
<script>
(async function() {
  const user = await checkAuth()
  if (!user) return
  document.body.innerHTML = `
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="auth-logo-icon">C</div>
          <h1>Welcome, ${user.username}</h1>
          <p>${user.email}</p>
        </div>
        <p style="text-align:center;color:var(--text-sec);font-size:13px;margin-bottom:20px;">
          Slice 2 coming next — App Shell + Map
        </p>
        <button class="btn-primary" onclick="logout()">Log Out</button>
      </div>
    </div>`
})()
</script>
</body>
</html>
