<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alert Review — Concordia Safety</title>
<link rel="stylesheet" href="styles/ios.css">
<style>
.content {
  position: absolute;
  top: 52px;
  bottom: 0;
  left: 0; right: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 40px;
}
.large-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: 0.37px;
  color: var(--label);
  padding: 16px 20px 4px;
}
.subtitle {
  font-size: 15px;
  color: var(--tertiary-label);
  padding: 0 20px 16px;
  letter-spacing: -0.24px;
}

/* Radio options as iOS segmented-like buttons */
.radio-group {
  display: flex;
  gap: 8px;
  padding: 4px 0 8px;
}
.radio-option {
  flex: 1;
  position: relative;
}
.radio-option input { position: absolute; opacity: 0; width: 0; height: 0 }
.radio-label {
  display: block;
  text-align: center;
  padding: 10px 8px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: -0.24px;
  color: var(--label);
  background: var(--fill);
  cursor: pointer;
  transition: all .2s;
  font-family: var(--sf);
}
.radio-option input:checked + .radio-label {
  background: var(--crimson);
  color: #fff;
}
.radio-option input:checked + .radio-label:active { opacity: 0.8 }

.question-label {
  font-size: 15px;
  color: var(--label);
  letter-spacing: -0.24px;
  padding: 8px 0 4px;
}

/* Comment textarea */
.review-textarea {
  width: 100%;
  border: none;
  outline: none;
  font-size: 17px;
  color: var(--label);
  letter-spacing: -0.41px;
  background: none;
  font-family: var(--sf);
  resize: none;
  min-height: 60px;
  line-height: 1.4;
}
.review-textarea::placeholder { color: rgba(60,60,67,0.3) }

.submit-btn {
  display: block;
  width: calc(100% - 32px);
  margin: 24px 16px 12px;
  padding: 16px;
  background: var(--crimson);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.41px;
  cursor: pointer;
  font-family: var(--sf);
}
.submit-btn:active { opacity: 0.8; transform: scale(0.98) }
.submit-btn:disabled { opacity: 0.4 }

.form-error {
  display: none;
  margin: 0 16px 8px;
  padding: 10px 14px;
  background: rgba(255,59,48,0.12);
  border-radius: 10px;
  font-size: 13px;
  color: var(--red);
  text-align: center;
  letter-spacing: -0.08px;
}
</style>
</head>
<body>
<div class="device" style="background:var(--bg)">

  <div class="nav-bar">
    <button class="nav-back" type="button" onclick="history.back()">
      <svg width="12" height="20" viewBox="0 0 12 20" fill="none"><path d="M10 2L2 10l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </button>
    <span class="nav-title">Review</span>
  </div>

  <div class="content">
    <div class="large-title">Post-Arrival Review</div>
    <div class="subtitle">Help verify this alert for other students.</div>

    <div class="form-error" id="form-error"></div>

    <!-- Hazard Status -->
    <div class="group-header">Hazard Status</div>
    <div class="inset-group">
      <div class="list-row" style="cursor:default;flex-direction:column;align-items:stretch">
        <div class="question-label">Is the hazard still present?</div>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="hazard" value="yes"><span class="radio-label">Yes</span></label>
          <label class="radio-option"><input type="radio" name="hazard" value="no"><span class="radio-label">No</span></label>
          <label class="radio-option"><input type="radio" name="hazard" value="partially"><span class="radio-label">Partial</span></label>
        </div>
      </div>
      <div class="list-row" style="cursor:default;flex-direction:column;align-items:stretch">
        <div class="question-label">How has the situation changed?</div>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="situation" value="improved"><span class="radio-label">Improved</span></label>
          <label class="radio-option"><input type="radio" name="situation" value="worsened"><span class="radio-label">Worsened</span></label>
          <label class="radio-option"><input type="radio" name="situation" value="no change"><span class="radio-label">Same</span></label>
        </div>
      </div>
    </div>

    <!-- Location -->
    <div class="group-header">Location Accuracy</div>
    <div class="inset-group">
      <div class="list-row" style="cursor:default;flex-direction:column;align-items:stretch">
        <div class="question-label">Is the location accurate?</div>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="location" value="yes"><span class="radio-label">Yes</span></label>
          <label class="radio-option"><input type="radio" name="location" value="no"><span class="radio-label">No</span></label>
        </div>
      </div>
    </div>

    <!-- Severity -->
    <div class="group-header">Severity</div>
    <div class="inset-group">
      <div class="list-row" style="cursor:default;flex-direction:column;align-items:stretch">
        <div class="question-label">Current severity level:</div>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" name="severity" value="low"><span class="radio-label">Low</span></label>
          <label class="radio-option"><input type="radio" name="severity" value="medium"><span class="radio-label">Medium</span></label>
          <label class="radio-option"><input type="radio" name="severity" value="high"><span class="radio-label">High</span></label>
        </div>
      </div>
    </div>

    <!-- Comment -->
    <div class="group-header">Comment (optional)</div>
    <div class="inset-group">
      <div class="list-row" style="cursor:default;align-items:flex-start;min-height:80px">
        <div class="row-body">
          <textarea class="review-textarea" id="comment" placeholder="Add a short comment..."></textarea>
        </div>
      </div>
    </div>

    <button class="submit-btn" type="button" id="submit-btn">Submit Review</button>
  </div>
</div>

<script src="scripts/api.js"></script>
<script src="scripts/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function() {
  await checkAuth()

  var params = new URLSearchParams(window.location.search)
  var alertId = params.get('id')

  document.getElementById('submit-btn').addEventListener('click', async function() {
    var errorEl = document.getElementById('form-error')
    var hazard = document.querySelector('input[name="hazard"]:checked')
    var situation = document.querySelector('input[name="situation"]:checked')
    var location = document.querySelector('input[name="location"]:checked')
    var severity = document.querySelector('input[name="severity"]:checked')

    if (!hazard || !situation || !location || !severity) {
      errorEl.textContent = 'Please answer all required questions.'
      errorEl.style.display = 'block'
      return
    }
    errorEl.style.display = 'none'

    // Determine status
    var status
    if (hazard.value === 'no' || situation.value === 'improved') {
      status = 'RESOLVED'
    } else if (hazard.value === 'yes' && situation.value === 'worsened') {
      status = 'ACTIVE'
    } else {
      status = 'UNDER REVIEW'
    }

    var btn = document.getElementById('submit-btn')
    btn.disabled = true

    try {
      if (alertId) {
        await window.API.updateAlert(alertId, {
          status: status,
          verification: 'Verified by Campus Safety'
        })
      }
      alert('Thank you! Your review has been submitted.')
      window.location.href = 'app.html'
    } catch (e) {
      alert('Error submitting review. Please try again.')
      btn.disabled = false
    }
  })
})
</script>
</body>
</html>
