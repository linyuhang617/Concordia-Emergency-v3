<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alert Review — Concordia Emergency</title>
<link rel="stylesheet" href="styles/web.css">
<style>
.review-page { min-height:100vh; background:#f2f2f7; display:flex; flex-direction:column; }
.review-content { max-width:680px; margin:80px auto 48px; padding:0 24px 48px; width:100%; }
.page-title { font-size:28px; font-weight:700; color:#1c1c1e; margin-bottom:6px; }
.page-sub { font-size:15px; color:#8e8e93; margin-bottom:24px; }
.form-card { background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.07); margin-bottom:16px; }
.form-card-header { padding:12px 20px 8px; font-size:13px; font-weight:600; color:#8e8e93; text-transform:uppercase; letter-spacing:0.04em; border-bottom:1px solid #f2f2f7; }
.form-section { padding:16px 20px; border-bottom:1px solid #f2f2f7; }
.form-section:last-child { border-bottom:none; }
.question-label { font-size:15px; color:#1c1c1e; font-weight:500; margin-bottom:12px; }
.radio-group { display:flex; gap:8px; }
.radio-option { flex:1; position:relative; }
.radio-option input { position:absolute; opacity:0; width:0; height:0; }
.radio-label {
  display:block; text-align:center; padding:10px 8px; border-radius:10px;
  font-size:14px; font-weight:500; color:#1c1c1e; background:#f2f2f7;
  cursor:pointer; transition:all 0.15s; user-select:none;
}
.radio-option input:checked + .radio-label { background:var(--crimson); color:#fff; }
.radio-label:hover { background:#e5e5ea; }
.radio-option input:checked + .radio-label:hover { background:var(--crimson); opacity:0.9; }
.review-textarea {
  width:100%; border:none; outline:none; font-size:15px; color:#1c1c1e;
  background:none; font-family:inherit; resize:none; min-height:72px; line-height:1.5;
}
.review-textarea::placeholder { color:#c7c7cc; }
.form-error {
  display:none; padding:10px 16px; background:rgba(255,59,48,0.1);
  border-radius:10px; font-size:13px; color:#ff3b30; margin-bottom:12px;
}
.submit-btn {
  display:block; width:100%; padding:15px; background:var(--crimson); color:#fff;
  border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer;
  font-family:inherit; transition:opacity 0.15s;
}
.submit-btn:hover { opacity:0.85; }
.submit-btn:disabled { opacity:0.4; cursor:default; }
</style>
</head>
<body>
<div class="review-page">
  <nav class="nav-bar">
    <a class="nav-brand" href="app.html">
      <div class="nav-brand-icon">C</div>
      Concordia Emergency
    </a>
    <span style="font-weight:600;font-size:17px;color:#fff;position:absolute;left:50%;transform:translateX(-50%);">Post-Arrival Review</span>
    <div class="nav-right">
      <button id="crisis-btn" class="nav-icon-btn" title="Crisis Mode" onclick="window.location.href='app.html?crisis=1'">⚠️</button>
      <a class="nav-avatar" id="profile-initial" href="profile.html" title="Profile">?</a>
    </div>
  </nav>

  <div class="review-content">
    <div class="page-title">Post-Arrival Review</div>
    <div class="page-sub">Help verify this alert for other students.</div>
    <div style="font-size:13px;color:#8e8e93;margin-bottom:16px;"><span style="color:#ff3b30">*</span> Required</div>

    <div class="form-error" id="form-error"></div>

    <div class="form-card">
      <div class="form-card-header">Hazard Status</div>
      <div class="form-section">
        <div class="question-label">Is the hazard still present? <span style="color:#ff3b30">*</span></div>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" tabindex="-1" name="hazard" value="yes"><span class="radio-label">Yes</span></label>
          <label class="radio-option"><input type="radio" tabindex="-1" name="hazard" value="no"><span class="radio-label">No</span></label>
          <label class="radio-option"><input type="radio" tabindex="-1" name="hazard" value="partially"><span class="radio-label">Partial</span></label>
        </div>
      </div>
      <div class="form-section">
        <div class="question-label">How has the situation changed? <span style="color:#ff3b30">*</span></div>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" tabindex="-1" name="situation" value="improved"><span class="radio-label">Improved</span></label>
          <label class="radio-option"><input type="radio" tabindex="-1" name="situation" value="worsened"><span class="radio-label">Worsened</span></label>
          <label class="radio-option"><input type="radio" tabindex="-1" name="situation" value="no change"><span class="radio-label">Same</span></label>
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-card-header">Location Accuracy</div>
      <div class="form-section">
        <div class="question-label">Is the location accurate? <span style="color:#ff3b30">*</span></div>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" tabindex="-1" name="location" value="yes"><span class="radio-label">Yes</span></label>
          <label class="radio-option"><input type="radio" tabindex="-1" name="location" value="no"><span class="radio-label">No</span></label>
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-card-header">Severity</div>
      <div class="form-section">
        <div class="question-label">Current severity level: <span style="color:#ff3b30">*</span></div>
        <div class="radio-group">
          <label class="radio-option"><input type="radio" tabindex="-1" name="severity" value="low"><span class="radio-label">Low</span></label>
          <label class="radio-option"><input type="radio" tabindex="-1" name="severity" value="medium"><span class="radio-label">Medium</span></label>
          <label class="radio-option"><input type="radio" tabindex="-1" name="severity" value="high"><span class="radio-label">High</span></label>
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-card-header">Comment <span style="color:#8e8e93;font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></div>
      <div class="form-section">
        <textarea class="review-textarea" id="comment" placeholder="Add a short comment..."></textarea>
      </div>
    </div>

    <button class="submit-btn" type="button" id="submit-btn">Submit Review</button>
    <button type="button" onclick="history.back()" style="display:block;width:100%;padding:14px;background:transparent;color:var(--crimson);border:1.5px solid var(--crimson);border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;margin-top:10px;">← Back</button>
  </div>
</div>

<script src="scripts/api.js"></script>
<script src="scripts/auth.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  var user = await checkAuth()
  if (!user) return
  var profileBtn = document.getElementById("profile-initial")
  if (profileBtn && user.username) profileBtn.textContent = user.username.charAt(0).toUpperCase()

  var params = new URLSearchParams(window.location.search)
  var alertId = params.get("id")

  document.getElementById("submit-btn").addEventListener("click", async function() {
    var errorEl = document.getElementById("form-error")
    var hazard = document.querySelector("input[name=hazard]:checked")
    var situation = document.querySelector("input[name=situation]:checked")
    var location = document.querySelector("input[name=location]:checked")
    var severity = document.querySelector("input[name=severity]:checked")

    if (!hazard || !situation || !location || !severity) {
      errorEl.textContent = "Please answer all required questions."
      errorEl.style.display = "block"
      return
    }
    errorEl.style.display = "none"

    var status
    if (hazard.value === "no" || situation.value === "improved") {
      status = "RESOLVED"
    } else if (hazard.value === "yes" && situation.value === "worsened") {
      status = "ACTIVE"
    } else {
      status = "UNDER REVIEW"
    }

    var btn = document.getElementById("submit-btn")
    btn.disabled = true

    try {
      if (alertId) {
        await window.API.updateAlert(alertId, {
          status: status,
          verification: "Verified by Campus Safety"
        })
      }
      alert("Thank you! Your review has been submitted.")
      window.location.href = "app.html"
    } catch(e) {
      alert("Error submitting review. Please try again.")
      btn.disabled = false
    }
  })
})
</script>
</body>
</html>
