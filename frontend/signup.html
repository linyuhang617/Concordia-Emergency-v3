<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Concordia Emergency</title>
  <link rel="stylesheet" href="styles/web.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-icon">C</div>
      <h1>Concordia Emergency</h1>
      <p>Create your account</p>
    </div>

    <div class="auth-error"   id="error-msg"></div>
    <div class="auth-success" id="success-msg"></div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="username" placeholder="Choose a username" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="At least 6 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input class="form-input" type="password" id="confirm-password" placeholder="Re-enter password" autocomplete="new-password">
    </div>

    <button class="btn-primary" type="button" id="signup-btn">Sign Up</button>

    <div class="auth-footer">
      Already have an account? <a href="index.html">Log In</a>
    </div>

  </div>
</div>

<script src="scripts/api.js"></script>
<script>
if (localStorage.getItem('token')) {
  window.location.href = 'app.html'
}

function showError(msg) {
  const el = document.getElementById('error-msg')
  el.textContent = msg
  el.style.display = 'block'
  document.getElementById('success-msg').style.display = 'none'
}

function showSuccess(msg) {
  const el = document.getElementById('success-msg')
  el.textContent = msg
  el.style.display = 'block'
  document.getElementById('error-msg').style.display = 'none'
}

function clearMessages() {
  document.getElementById('error-msg').style.display = 'none'
  document.getElementById('success-msg').style.display = 'none'
}

function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)
}

async function handleSignUp() {
  clearMessages()
  const username        = document.getElementById('username').value.trim()
  const email           = document.getElementById('email').value.trim()
  const password        = document.getElementById('password').value
  const confirmPassword = document.getElementById('confirm-password').value

  if (!username || !email || !password || !confirmPassword) {
    showError('Please fill in all fields.')
    return
  }
  if (!isValidEmail(email)) {
    showError('Please enter a valid email address.')
    return
  }
  if (password.length < 6) {
    showError('Password must be at least 6 characters.')
    return
  }
  if (password !== confirmPassword) {
    showError('Passwords do not match.')
    return
  }

  try {
    const result = await window.API.signup({
      username, email, password, accessibility: []
    })

    if (result.detail) {
      showError(result.detail)
      return
    }

    showSuccess('Account created! Redirecting to login…')
    setTimeout(() => { window.location.href = 'index.html' }, 1500)
  } catch (e) {
    showError('Connection error. Is the server running?')
  }
}

document.getElementById('signup-btn').addEventListener('click', handleSignUp)

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleSignUp()
})
</script>
</body>
</html>
