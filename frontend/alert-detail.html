<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alert Detail — Concordia Safety</title>
<link rel="stylesheet" href="styles/ios.css">
<style>
.content {
  position: absolute;
  top: 52px;
  bottom: 83px;
  left: 0; right: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* Status badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.08px;
}
.status-badge.active { background: rgba(255,59,48,0.12); color: #ff3b30 }
.status-badge.review { background: rgba(255,149,0,0.12); color: #ff9500 }
.status-badge.resolved { background: rgba(52,199,89,0.12); color: #34c759 }
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* Hero card */
.hero-card {
  background: var(--grouped-bg);
  margin: 12px 16px;
  border-radius: 12px;
  padding: 20px 16px;
  text-align: center;
}
.hero-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin: 0 auto 12px;
}
.hero-icon.red { background: rgba(255,59,48,0.12) }
.hero-icon.orange { background: rgba(255,149,0,0.12) }
.hero-icon.purple { background: rgba(175,82,222,0.12) }
.hero-icon.blue { background: rgba(0,122,255,0.12) }
.hero-icon.gray { background: rgba(142,142,147,0.12) }
.hero-title {
  font-size: 22px;
  font-weight: 600;
  color: var(--label);
  letter-spacing: -0.35px;
  margin-bottom: 4px;
}
.hero-building {
  font-size: 15px;
  color: var(--tertiary-label);
  letter-spacing: -0.24px;
  margin-bottom: 12px;
}

/* Detail rows */
.detail-label {
  font-size: 13px;
  color: var(--tertiary-label);
  letter-spacing: -0.08px;
}
.detail-value {
  font-size: 17px;
  color: var(--label);
  letter-spacing: -0.41px;
}
.detail-value-sm {
  font-size: 15px;
  color: var(--label);
  letter-spacing: -0.24px;
  line-height: 1.4;
}

/* Action button */
.action-btn {
  display: block;
  width: calc(100% - 32px);
  margin: 16px 16px 8px;
  padding: 16px;
  background: var(--crimson);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.41px;
  cursor: pointer;
  font-family: var(--sf);
  text-align: center;
  text-decoration: none;
}
.action-btn:active { opacity: 0.8; transform: scale(0.98) }

.secondary-btn {
  display: block;
  width: calc(100% - 32px);
  margin: 0 16px 24px;
  padding: 14px;
  background: none;
  color: var(--blue);
  border: 1px solid var(--separator);
  border-radius: 14px;
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.41px;
  cursor: pointer;
  font-family: var(--sf);
  text-align: center;
  text-decoration: none;
}
.secondary-btn:active { opacity: 0.6 }
</style>
</head>
<body>
<div class="device" style="background:var(--bg)">

  <!-- Nav Bar -->
  <div class="nav-bar">
    <button class="nav-back" type="button" onclick="window.location.href='app.html'">
      <svg width="12" height="20" viewBox="0 0 12 20" fill="none"><path d="M10 2L2 10l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Map
    </button>
    <span class="nav-title">Alert Detail</span>
  </div>

  <div class="content">
    <!-- Hero -->
    <div class="hero-card" id="hero-card">
      <div class="hero-icon" id="hero-icon">...</div>
      <div class="hero-title" id="hero-title">Loading...</div>
      <div class="hero-building" id="hero-building"></div>
      <div id="hero-status"></div>
    </div>

    <!-- Info -->
    <div class="group-header">Information</div>
    <div class="inset-group">
      <div class="list-row" style="cursor:default">
        <div class="row-body">
          <div class="detail-label">Verification</div>
          <div class="detail-value" id="detail-verification">—</div>
        </div>
      </div>
      <div class="list-row" style="cursor:default">
        <div class="row-body">
          <div class="detail-label">Description</div>
          <div class="detail-value-sm" id="detail-description">—</div>
        </div>
      </div>
      <div class="list-row" style="cursor:default">
        <div class="row-body">
          <div class="detail-label">Reported</div>
          <div class="detail-value" id="detail-time">—</div>
        </div>
      </div>
      <div class="list-row" style="cursor:default">
        <div class="row-body">
          <div class="detail-label">Last Updated</div>
          <div class="detail-value" id="detail-updated">—</div>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <button class="action-btn" id="approve-btn" style="display:none;background:#34c759">✅ Approve Alert</button>
    <button class="action-btn" id="resolve-btn" style="display:none;background:#8e8e93;margin-top:0">❌ Resolve Alert</button>
    <a class="action-btn" id="review-btn" href="#">Post-Arrival Review</a>
    <a class="secondary-btn" href="app.html">← Back to Map</a>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <a class="tab active" href="app.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="var(--tint)" stroke="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/></svg>
      <span class="tab-label">Map</span>
    </a>
    <div class="tab-report">
      <a href="report.html">
        <div class="tab-report-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
      </a>
      <span class="tab-label" style="color:#999;margin-top:4px;display:block;text-align:center">Report</span>
    </div>
    <a class="tab" href="profile.html">
      <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="tab-label">Profile</span>
    </a>
  </div>
</div>

<script src="scripts/api.js"></script>
<script src="scripts/auth.js"></script>
<script>
var alertIcons = {
  'Protest': '✊', 'Construction': '🚧',
  'Elevator Malfunction': '⚡', 'Weather Hazard': '🌬', 'Others': '⚠️'
}
var alertIconColors = {
  'Protest': 'red', 'Construction': 'orange',
  'Elevator Malfunction': 'purple', 'Weather Hazard': 'blue', 'Others': 'gray'
}
var statusStyles = {
  'ACTIVE': 'active', 'PENDING': 'review', 'RESOLVED': 'resolved'
}

document.addEventListener('DOMContentLoaded', async function() {
  await checkAuth()

  var params = new URLSearchParams(window.location.search)
  var id = params.get('id')
  if (!id) {
    document.getElementById('hero-title').textContent = 'Alert not found'
    return
  }

  try {
    var alert = await window.API.getAlert(id)
    if (!alert || alert.detail) {
      document.getElementById('hero-title').textContent = 'Alert not found'
      return
    }

    // Hero
    var icon = alertIcons[alert.type] || '⚠️'
    var iconColor = alertIconColors[alert.type] || 'gray'
    document.getElementById('hero-icon').textContent = icon
    document.getElementById('hero-icon').className = 'hero-icon ' + iconColor
    document.getElementById('hero-title').textContent = alert.type
    document.getElementById('hero-building').textContent = alert.building_code + ' Building'

    // Status badge
    var st = statusStyles[alert.status] || 'active'
    document.getElementById('hero-status').innerHTML =
      '<span class="status-badge ' + st + '"><span class="status-dot"></span>' + alert.status + '</span>'

    // Info
    var verText = alert.report_count === 1 ? 'Reported by 1 student' : 'Reported by ' + alert.report_count + ' students'
    document.getElementById('detail-verification').textContent = verText
    document.getElementById('detail-description').textContent = alert.description
    document.getElementById('detail-time').textContent = alert.created_at || '—'
    document.getElementById('detail-updated').textContent = alert.updated_at || alert.created_at || '—'

    // Review button
    document.getElementById('review-btn').href = 'alert-review.html?id=' + alert.id

    // Staff buttons
    var me = await window.API.getMe()
    if (me && me.role === 'staff') {
      var approveBtn = document.getElementById('approve-btn')
      var resolveBtn = document.getElementById('resolve-btn')
      if (alert.status === 'PENDING') approveBtn.style.display = 'block'
      resolveBtn.style.display = 'block'
      approveBtn.addEventListener('click', async function() {
        approveBtn.disabled = true
        await window.API.approveAlert(alert.id)
        window.location.reload()
      })
      resolveBtn.addEventListener('click', async function() {
        resolveBtn.disabled = true
        await window.API.resolveAlert(alert.id)
        window.location.reload()
      })
    }
  } catch (e) {
    document.getElementById('hero-title').textContent = 'Error loading alert'
    console.warn('Alert detail error:', e)
  }
})
</script>
</body>
</html>
