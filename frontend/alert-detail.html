<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alert Detail — Concordia Emergency</title>
<link rel="stylesheet" href="styles/web.css">
<style>
.detail-page {
  min-height: 100vh;
  background: #f2f2f7;
  display: flex;
  flex-direction: column;
}
.detail-content {
  max-width: 680px;
  margin: 32px auto;
  padding: 0 24px 48px;
  width: 100%;
}
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--crimson);
  font-size: 15px;
  font-weight: 500;
  text-decoration: none;
  margin-bottom: 24px;
}
.back-link:hover { opacity: 0.75; }
.back-link svg { flex-shrink: 0; }

/* Hero card */
.hero-card {
  background: #fff;
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.hero-icon {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 16px;
}
.hero-icon.red    { background: rgba(255,59,48,0.12); }
.hero-icon.orange { background: rgba(255,149,0,0.12); }
.hero-icon.purple { background: rgba(175,82,222,0.12); }
.hero-icon.blue   { background: rgba(0,122,255,0.12); }
.hero-icon.gray   { background: rgba(142,142,147,0.12); }
.hero-title {
  font-size: 26px;
  font-weight: 700;
  color: #1c1c1e;
  margin-bottom: 4px;
}
.hero-building {
  font-size: 16px;
  color: #8e8e93;
  margin-bottom: 16px;
}
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
}
.status-badge.active   { background: rgba(255,59,48,0.12);  color: #ff3b30; }
.status-badge.review   { background: rgba(142,142,147,0.15); color: #636366; }
.status-badge.resolved { background: rgba(52,199,89,0.12);  color: #34c759; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

/* Info card */
.info-card {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07);
}
.info-card-header {
  padding: 12px 20px 8px;
  font-size: 13px;
  font-weight: 600;
  color: #8e8e93;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 1px solid #f2f2f7;
}
.info-row {
  padding: 14px 20px;
  border-bottom: 1px solid #f2f2f7;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 12px; color: #8e8e93; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
.info-value { font-size: 16px; color: #1c1c1e; line-height: 1.45; }

/* Action buttons */
.actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.action-btn {
  display: block;
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  font-family: inherit;
  transition: opacity 0.15s;
}
.action-btn:hover { opacity: 0.85; }
.action-btn.primary  { background: var(--crimson); color: #fff; }
.action-btn.approve  { background: #34c759; color: #fff; }
.action-btn.resolve  { background: #8e8e93; color: #fff; }
.action-btn.outline  { background: transparent; color: var(--crimson); border: 1.5px solid var(--crimson); }
</style>
</head>
<body>
<div class="detail-page">

  <!-- Nav Bar -->
  <nav class="nav-bar">
    <a class="nav-brand" href="app.html">
      <div class="nav-brand-icon">C</div>
      Concordia Emergency
    </a>
    <span style="font-weight:600;font-size:17px;color:#fff;position:absolute;left:50%;transform:translateX(-50%);">Alert Detail</span>
    <div class="nav-right">
      <button id="crisis-btn" class="nav-icon-btn" title="Crisis Mode">⚠️</button>
      <a class="nav-avatar" id="profile-initial" href="profile.html" title="Profile">?</a>
    </div>
  </nav>

  <div class="detail-content">
    <!-- Back -->
    <a href="app.html" class="back-link">
      <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to Map
    </a>

    <!-- Hero Card -->
    <div class="hero-card">
      <div class="hero-icon" id="hero-icon">…</div>
      <div class="hero-title" id="hero-title">Loading…</div>
      <div class="hero-building" id="hero-building"></div>
      <div id="hero-status"></div>
    </div>

    <!-- Info Card -->
    <div class="info-card">
      <div class="info-card-header">Information</div>
      <div class="info-row">
        <div class="info-label">Verification</div>
        <div class="info-value" id="detail-verification">—</div>
      </div>
      <div class="info-row">
        <div class="info-label">Description</div>
        <div class="info-value" id="detail-description">—</div>
      </div>
      <div class="info-row">
        <div class="info-label">Reported</div>
        <div class="info-value" id="detail-time">—</div>
      </div>
      <div class="info-row">
        <div class="info-label">Last Updated</div>
        <div class="info-value" id="detail-updated">—</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="action-btn approve" id="approve-btn" style="display:none">✅ Approve Alert</button>
      <button class="action-btn resolve" id="resolve-btn" style="display:none">Resolve Alert</button>
      <a class="action-btn primary" id="review-btn" href="#">Post-Arrival Review</a>
    </div>
  </div>
</div>

<script src="scripts/api.js"></script>
<script src="scripts/auth.js"></script>
<script>
var alertIcons = {
  'Protest': '✊', 'Construction': '🚧',
  'Elevator Malfunction': '⚡', 'Weather Hazard': '🌬', 'Others': '⚠️'
}
var alertIconColors = {
  'Protest': 'red', 'Construction': 'orange',
  'Elevator Malfunction': 'purple', 'Weather Hazard': 'blue', 'Others': 'gray'
}
var statusStyles = { 'ACTIVE': 'active', 'PENDING': 'review', 'RESOLVED': 'resolved' }

document.addEventListener('DOMContentLoaded', async function() {
  var user = await checkAuth()
  if (!user) return

  var profileBtn = document.getElementById('profile-initial')
  if (profileBtn && user.username) profileBtn.textContent = user.username.charAt(0).toUpperCase()

  var params = new URLSearchParams(window.location.search)
  var id = params.get('id')
  if (!id) { document.getElementById('hero-title').textContent = 'Alert not found'; return }

  try {
    var alert = await window.API.getAlert(id)
    if (!alert || alert.detail) { document.getElementById('hero-title').textContent = 'Alert not found'; return }

    var icon = alertIcons[alert.type] || '⚠️'
    var iconColor = alertIconColors[alert.type] || 'gray'
    document.getElementById('hero-icon').textContent = icon
    document.getElementById('hero-icon').className = 'hero-icon ' + iconColor
    document.getElementById('hero-title').textContent = alert.type
    document.getElementById('hero-building').textContent = alert.building_code + ' Building'

    var st = statusStyles[alert.status] || 'active'
    document.getElementById('hero-status').innerHTML =
      '<span class="status-badge ' + st + '"><span class="status-dot"></span>' + alert.status + '</span>'

    var verText = alert.report_count === 1 ? 'Reported by 1 student' : 'Reported by ' + alert.report_count + ' students'
    document.getElementById('detail-verification').textContent = verText
    document.getElementById('detail-description').textContent = alert.description
    document.getElementById('detail-time').textContent = alert.created_at || '—'
    document.getElementById('detail-updated').textContent = alert.updated_at || alert.created_at || '—'

    document.getElementById('review-btn').href = 'alert-review.html?id=' + alert.id

    var me = await window.API.getMe()
    if (me && me.role === 'staff') {
      var approveBtn = document.getElementById('approve-btn')
      var resolveBtn = document.getElementById('resolve-btn')
      if (alert.status === 'PENDING') approveBtn.style.display = 'block'
      if (alert.status !== 'RESOLVED') resolveBtn.style.display = 'block'
      function showToast(msg) {
        var t = document.createElement('div')
        t.textContent = msg
        t.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transition:opacity 0.2s'
        document.body.appendChild(t)
        setTimeout(function() { t.style.opacity = '1' }, 10)
        setTimeout(function() { t.style.opacity = '0'; setTimeout(function() { t.remove() }, 200) }, 2000)
      }
      approveBtn.addEventListener('click', async function() {
        approveBtn.disabled = true
        await window.API.approveAlert(alert.id)
        showToast('✅ Alert approved')
        setTimeout(function() { window.location.reload() }, 1000)
      })
      resolveBtn.addEventListener('click', async function() {
        resolveBtn.disabled = true
        await window.API.resolveAlert(alert.id)
        showToast('✅ Alert resolved')
        setTimeout(function() { window.location.reload() }, 1000)
      })
    }
  } catch(e) {
    document.getElementById('hero-title').textContent = 'Error loading alert'
    console.warn('Alert detail error:', e)
  }
})
</script>
</body>
</html>
