<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert History — Concordia Safety</title>
  <link rel="icon" href="../images/concordia-logo.png">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/cards.css">
  <link rel="stylesheet" href="../styles/pages.css">
</head>
<body class="page-body">

  <!-- Header -->
  <header class="app-header">
    <div class="logo" onclick="window.location.href='../index.html'">
      <div class="logo-circle">C</div>
      <span class="logo-text">Concordia Safety</span>
    </div>
    <nav class="desktop-nav">
      <a href="../index.html">Map</a>
      <a href="report.html">Report</a>
      <a href="alert-history.html" class="active">Alerts</a>
      <a href="profile.html">Profile</a>
    </nav>
    <div class="header-actions">
      <button type="button" class="header-btn" onclick="window.location.href='../index.html'" title="Home">🏠</button>
    </div>
  </header>

  <!-- Page Title -->
  <div class="sub-header">
    <h2 class="page-title">Alert History</h2>
  </div>

  <!-- Status Tabs -->
  <div class="history-tabs" id="history-tabs-js">
    <button type="button" class="history-tab active" data-status="ACTIVE">Active</button>
    <button type="button" class="history-tab" data-status="UNDER REVIEW">Under Review</button>
    <button type="button" class="history-tab" data-status="RESOLVED">Resolved</button>
  </div>

  <!-- Alert List -->
  <div class="history-list" id="history-list-js">
    <div class="alert-empty">Loading alerts...</div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <a class="tab-item" href="../index.html">
      <span class="tab-icon">🗺</span>
      <span>Map</span>
    </a>
    <a class="tab-fab" href="report.html" title="Report Hazard">+</a>
    <a class="tab-item" href="profile.html">
      <span class="tab-icon">👤</span>
      <span>Profile</span>
    </a>
  </nav>

  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/alert-history.js"></script>
</body>
</html>
