<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm Report — Concordia Safety</title>
  <link rel="icon" href="../images/concordia-logo.png">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/forms.css">
  <link rel="stylesheet" href="../styles/pages.css">
</head>
<body class="page-body">

  <!-- Header -->
  <header class="app-header">
    <div class="logo" onclick="window.location.href='../index.html'">
      <div class="logo-circle">C</div>
      <span class="logo-text">Concordia Safety</span>
    </div>
    <div class="header-actions">
      <button type="button" class="header-btn" onclick="history.back()" title="Back">←</button>
    </div>
  </header>

  <!-- Progress -->
  <div class="progress-bar">
    <progress value="3" max="3"></progress>
  </div>
  <div class="step-indicator">Step 3 of 3 — Confirm & Submit</div>

  <!-- Confirmation Details -->
  <div class="confirm-card" id="detail-js"></div>

  <!-- Buttons -->
  <div style="padding:8px 16px;">
    <button type="button" class="form-submit" id="submitBtn">Submit Report</button>
    <div style="text-align:center;margin-top:10px;">
      <a href="javascript:history.back()" style="font-size:0.85rem;">← Edit Report</a>
    </div>
  </div>

  <!-- Success Popup -->
  <div class="popup-overlay" id="successPopup">
    <div class="popup-box">
      <p>✅ Submission successful!</p>
      <button type="button" id="popupOkBtn">OK</button>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <a class="tab-item" href="../index.html">
      <span class="tab-icon">🗺</span>
      <span>Map</span>
    </a>
    <a class="tab-fab" href="report.html" title="Report Hazard">+</a>
    <a class="tab-item" href="profile.html">
      <span class="tab-icon">👤</span>
      <span>Profile</span>
    </a>
  </nav>

  <script src="../data/building.js"></script>
  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/confirmation.js"></script>
</body>
</html>
