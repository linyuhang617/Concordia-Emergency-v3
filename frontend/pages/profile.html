<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile & Settings — Concordia Safety</title>
  <link rel="icon" href="../images/concordia-logo.png">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/cards.css">
  <link rel="stylesheet" href="../styles/forms.css">
  <link rel="stylesheet" href="../styles/pages.css">
</head>
<body class="page-body">

  <!-- Header -->
  <header class="app-header">
    <div class="logo" onclick="window.location.href='../index.html'">
      <div class="logo-circle">C</div>
      <span class="logo-text">Concordia Safety</span>
    </div>
    <nav class="desktop-nav">
      <a href="../index.html">Map</a>
      <a href="report.html">Report</a>
      <a href="alert-history.html">Alerts</a>
      <a href="profile.html" class="active">Profile</a>
    </nav>
    <div class="header-actions">
      <button type="button" class="header-btn" onclick="window.location.href='../index.html'" title="Home">🏠</button>
    </div>
  </header>

  <!-- User Card -->
  <div class="user-card">
    <div class="user-avatar" id="avatar-js">U</div>
    <div class="user-info">
      <div class="user-name username-js">Username</div>
      <div class="user-email user-email-js">email@example.com</div>
    </div>
  </div>

  <!-- Settings Sections -->
  <div class="profile-section-title">Settings</div>

  <!-- Safety -->
  <div class="settings-card" id="card-safety-js">
    <div class="settings-card-header">
      <span class="card-label">Safety Profile</span>
      <span class="card-chevron">▼</span>
    </div>
    <div class="settings-card-body">
      <div class="safety-inner-card-js"></div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="settings-card" id="card-nav-js">
    <div class="settings-card-header">
      <span class="card-label">Navigation</span>
      <span class="card-chevron">▼</span>
    </div>
    <div class="settings-card-body">
      <div class="navigation-inner-card-js"></div>
    </div>
  </div>

  <!-- Notifications -->
  <div class="settings-card" id="card-notif-js">
    <div class="settings-card-header">
      <span class="card-label">Notification Preferences</span>
      <span class="card-chevron">▼</span>
    </div>
    <div class="settings-card-body">
      <div class="notification-inner-card-js"></div>
    </div>
  </div>

  <!-- Quiet Hours -->
  <div class="settings-card" id="card-quiet-js">
    <div class="settings-card-header">
      <span class="card-label">Quiet Hours</span>
      <span class="card-chevron">▼</span>
    </div>
    <div class="settings-card-body">
      <div class="quiet-hours-inner-card-js"></div>
    </div>
  </div>

  <!-- Account -->
  <div class="profile-section-title">Account</div>
  <button type="button" class="logout-btn logOut-js">Log Out</button>
  <button type="button" class="delete-btn delete-button-js">Delete Account</button>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <a class="tab-item" href="../index.html">
      <span class="tab-icon">🗺</span>
      <span>Map</span>
    </a>
    <a class="tab-fab" href="report.html" title="Report Hazard">+</a>
    <a class="tab-item active" href="profile.html">
      <span class="tab-icon">👤</span>
      <span>Profile</span>
    </a>
  </nav>

  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/profile.js"></script>
</body>
</html>
