<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Report Hazard | Concordia Safety</title>
    <link rel="stylesheet" href="../styles/report.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" href="../images/concordia-logo.png">
  </head>
  <body>
     <!-- Header -->
    <div class="header">
      <div class="header-top">
        <div class="logo" onclick="window.location.href='../homepage.html'"><img src="../images/concordia-full-logo.svg" style="height:35px;"></div>
        <div class="home" onclick="window.location.href='../homepage.html'" style="display:flex;align-items:center;gap:8px;">
          <div style="width:36px;height:36px;border-radius:50%;background:#912338;display:flex;justify-content:center;align-items:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
              <path d="M9 21V12h6v9"/>
            </svg>
          </div>
          Home
        </div>
      </div>
      <div class="header-bottom">
        <div class="crisis">⚠️ Click for Crisis Mode</div>
      </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
      <div class="inner-container">
        <div class="outer-progress-bar">
          <div class="progress-bar">
            <progress id="formProgress" value="1" max="3"></progress> 
          </div>
        </div>

        <div class="title">
          <p>Hazard Type</p>
        </div>

        <div class="input-container">
          
          <div class="type-container">
            <button class="type-button protest-js"
              onclick="window.location.href='hazardsPages/protest.html'">
              Protest
            </button>
            <button class="type-button construction-js"
              onclick="window.location.href='hazardsPages/construction.html'">
              Construction
            </button>
            <button class="type-button weather-js"
              onclick="window.location.href='hazardsPages/weather.html'">
              Weather Hazard
            </button>
            <button class="type-button elevator-js"
              onclick="window.location.href='hazardsPages/elevator.html'">
              Elevator Malfunction
            </button>
            <button class="type-button other-button other-js"
              onclick="window.location.href='hazardsPages/other.html'">
              Others
            </button>
          </div>
        
      </div>
    </div>
    
    
    <script></script>
  </body>
</html>
