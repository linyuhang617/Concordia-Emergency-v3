<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert Detail — Concordia Safety</title>
  <link rel="icon" href="../images/concordia-logo.png">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/cards.css">
  <link rel="stylesheet" href="../styles/pages.css">
</head>
<body class="page-body">

  <!-- Header -->
  <header class="app-header">
    <div class="logo" onclick="window.location.href='../index.html'">
      <div class="logo-circle">C</div>
      <span class="logo-text">Concordia Safety</span>
    </div>
    <div class="header-actions">
      <button type="button" class="header-btn" onclick="window.location.href='alert-history.html'" title="Back">←</button>
    </div>
  </header>

  <!-- Detail Content -->
  <div class="detail-page">
    <!-- Header row -->
    <div class="detail-header">
      <button type="button" class="detail-back" onclick="window.location.href='alert-history.html'">←</button>
      <div>
        <h2 id="detail-title-js" style="margin-bottom:4px;">Loading...</h2>
        <span class="detail-badge" id="detail-badge-js"></span>
      </div>
    </div>

    <!-- Info cards -->
    <div class="detail-card">
      <div class="detail-label">Verification</div>
      <div class="detail-value" id="detail-verification-js">—</div>
    </div>

    <div class="detail-card">
      <div class="detail-label">Status</div>
      <div class="detail-value" id="detail-status-js">—</div>
    </div>

    <div class="detail-card">
      <div class="detail-label">Location / Description</div>
      <div class="detail-value" id="detail-desc-js">—</div>
    </div>

    <div class="detail-card">
      <div class="detail-label">Created</div>
      <div class="detail-value" id="detail-created-js">—</div>
    </div>

    <div class="detail-card">
      <div class="detail-label">Last Updated</div>
      <div class="detail-value" id="detail-updated-js">—</div>
    </div>

    <!-- Review button -->
    <div style="padding:8px 0;">
      <button type="button" class="form-submit" id="review-btn-js" style="display:none;">Review this Alert</button>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <nav class="tab-bar">
    <a class="tab-item" href="../index.html">
      <span class="tab-icon">🗺</span>
      <span>Map</span>
    </a>
    <a class="tab-fab" href="report.html" title="Report Hazard">+</a>
    <a class="tab-item" href="profile.html">
      <span class="tab-icon">👤</span>
      <span>Profile</span>
    </a>
  </nav>

  <script src="../scripts/api.js"></script>
  <script src="../scripts/auth.js"></script>
  <script src="../scripts/alert-detail.js"></script>
</body>
</html>
