<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Concordia Safety</title>
  <link rel="icon" href="../images/concordia-logo.png">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/forms.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-circle">C</div>
      </div>
      <h2 class="auth-title">Log In</h2>

      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-input" type="text" id="username" placeholder="Enter username" autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-with-toggle">
          <input class="form-input" type="password" id="password" placeholder="Enter password" autocomplete="current-password">
          <button type="button" class="toggle-vis show-password-js">👁</button>
        </div>
      </div>

      <button type="button" class="form-submit logIn-js">Log In</button>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="../scripts/api.js"></script>
  <script src="../scripts/logIn.js"></script>
</body>
</html>
