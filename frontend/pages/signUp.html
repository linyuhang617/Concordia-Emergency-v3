<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Concordia Safety</title>
  <link rel="icon" href="../images/concordia-logo.png">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/forms.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-circle">C</div>
      </div>
      <h2 class="auth-title">Sign Up</h2>

      <div class="form-group">
        <label class="form-label" for="username">Username <span class="required">*</span></label>
        <input class="form-input" type="text" id="username" placeholder="Choose a username" autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email <span class="required">*</span></label>
        <input class="form-input" type="email" id="email" placeholder="your@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password <span class="required">*</span></label>
        <div class="input-with-toggle">
          <input class="form-input" type="password" id="password" placeholder="Create password" autocomplete="new-password">
          <button type="button" class="toggle-vis show-password-js">👁</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="re-enter-password">Confirm Password <span class="required">*</span></label>
        <div class="input-with-toggle">
          <input class="form-input" type="password" id="re-enter-password" placeholder="Re-enter password" autocomplete="new-password">
          <button type="button" class="toggle-vis show-re-enter-password-js">👁</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="accessibility">Accessibility Preferences</label>
        <select class="form-select" id="accessibility" name="accessibility">
          <option value="">Select an option (optional)</option>
          <option value="wheelchair">Wheelchair user</option>
          <option value="mobility">Mobility impairment</option>
          <option value="visual">Visual impairment</option>
          <option value="anxiety">Anxiety-sensitive mode</option>
        </select>
      </div>

      <p class="form-error signUp-error-js" role="alert" aria-live="polite"></p>

      <button type="button" class="form-submit signUp-js">Sign Up</button>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log In</a>
      </div>
    </div>
  </div>

  <script src="../scripts/api.js"></script>
  <script src="../scripts/signUp.js"></script>
</body>
</html>
