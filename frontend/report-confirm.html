<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirm Report — Concordia Emergency</title>
<link rel="stylesheet" href="styles/web.css">
<style>
.report-page { min-height:100vh; background:#f2f2f7; display:flex; flex-direction:column; }
.report-content { max-width:680px; margin:80px auto 48px; padding:0 24px 48px; width:100%; }
.progress-track { height:4px; background:#e5e5ea; border-radius:4px; overflow:hidden; margin-bottom:6px; }
.progress-fill { height:100%; background:var(--crimson); border-radius:4px; }
.step-label { font-size:13px; color:#8e8e93; margin-bottom:20px; }
.page-title { font-size:28px; font-weight:700; color:#1c1c1e; margin-bottom:6px; }
.page-sub { font-size:15px; color:#8e8e93; margin-bottom:24px; }
.form-card { background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.07); margin-bottom:16px; }
.form-card-header { padding:12px 20px 8px; font-size:13px; font-weight:600; color:#8e8e93; text-transform:uppercase; letter-spacing:0.04em; border-bottom:1px solid #f2f2f7; }
.form-row { padding:14px 20px; border-bottom:1px solid #f2f2f7; display:flex; flex-direction:column; gap:4px; }
.form-row:last-child { border-bottom:none; }
.form-label { font-size:12px; color:#8e8e93; font-weight:500; text-transform:uppercase; letter-spacing:0.04em; }
.form-value { font-size:16px; color:#1c1c1e; line-height:1.45; }
.submit-btn {
  display:block; width:100%; padding:15px; background:var(--crimson); color:#fff;
  border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer;
  font-family:inherit; margin-bottom:10px; transition:opacity 0.15s;
}
.submit-btn:hover { opacity:0.85; }
.submit-btn:disabled { opacity:0.4; cursor:default; }
.back-btn {
  display:block; width:100%; padding:14px; background:transparent; color:var(--crimson);
  border:1.5px solid var(--crimson); border-radius:12px; font-size:16px; font-weight:500;
  cursor:pointer; font-family:inherit; text-align:center; transition:opacity 0.15s;
}
.back-btn:hover { opacity:0.75; }
.success-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45);
  z-index:500; align-items:center; justify-content:center;
}
.success-card {
  background:#fff; border-radius:20px; padding:40px 32px; text-align:center;
  max-width:400px; width:90%; box-shadow:0 16px 48px rgba(0,0,0,0.2);
}
.success-icon { font-size:52px; margin-bottom:16px; }
.success-title { font-size:22px; font-weight:700; color:#1c1c1e; margin-bottom:8px; }
.success-sub { font-size:15px; color:#8e8e93; line-height:1.5; margin-bottom:24px; }
.success-btn {
  width:100%; padding:14px; background:var(--crimson); color:#fff; border:none;
  border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; font-family:inherit;
}
</style>
</head>
<body>
<div class="report-page">
  <nav class="nav-bar">
    <a class="nav-brand" href="report-form.html">
      <div class="nav-brand-icon">C</div>
      Concordia Emergency
    </a>
    <span style="font-weight:600;font-size:17px;color:#fff;position:absolute;left:50%;transform:translateX(-50%);">Confirm Report</span>
    <div class="nav-right">
      <button id="crisis-btn" class="nav-icon-btn" title="Crisis Mode">⚠️</button>
      <a class="nav-avatar" id="profile-initial" href="profile.html" title="Profile">?</a>
    </div>
  </nav>

  <div class="report-content">
    <div class="page-title">Confirm Report</div>
    <div class="page-sub">Review the details before submitting.</div>
    <div class="progress-track"><div class="progress-fill" style="width:100%"></div></div>
    <div class="step-label">Step 3 of 3</div>

    <div class="form-card">
      <div class="form-card-header">Report Summary</div>
      <div class="form-row">
        <div class="form-label">Hazard Type</div>
        <div class="form-value" id="confirm-type">—</div>
      </div>
      <div class="form-row">
        <div class="form-label">Building</div>
        <div class="form-value" id="confirm-building">—</div>
      </div>
      <div class="form-row">
        <div class="form-label">Description</div>
        <div class="form-value" id="confirm-description">—</div>
      </div>
    </div>

    <button class="submit-btn" type="button" id="submit-btn">Submit Report</button>
    <button class="back-btn" type="button" onclick="history.back()">← Edit Details</button>
  </div>

  <div class="success-overlay" id="success-overlay">
    <div class="success-card">
      <div class="success-icon">✅</div>
      <div class="success-title">Report Submitted</div>
      <div class="success-sub">Your hazard report has been submitted. It will appear on the map shortly.</div>
      <button class="success-btn" type="button" id="success-ok">Back to Map</button>
    </div>
  </div>
</div>

<script src="scripts/api.js"></script>
<script src="scripts/auth.js"></script>
<script src="data/building.js"></script>
<script>
document.addEventListener("DOMContentLoaded", async function() {
  var user = await checkAuth()
  if (!user) return
  var profileBtn = document.getElementById("profile-initial")
  if (profileBtn && user.username) profileBtn.textContent = user.username.charAt(0).toUpperCase()

  var saved = sessionStorage.getItem("v3-report")
  if (!saved) { window.location.href = "report.html"; return }

  var report = JSON.parse(saved)
  var bldg = window.buildings.find(function(b) { return b.code === report.building_code })
  var buildingDisplay = bldg ? bldg.code + " — " + bldg.buildingName : report.building_code

  document.getElementById("confirm-type").textContent = report.type
  document.getElementById("confirm-building").textContent = buildingDisplay
  document.getElementById("confirm-description").textContent = report.description

  document.getElementById("submit-btn").addEventListener("click", async function() {
    var btn = this
    btn.disabled = true
    var lat = bldg ? String(bldg.lat) : "45.4973"
    var lng = bldg ? String(bldg.lng) : "-73.5789"
    var payload = {
      type: report.type,
      building_code: report.building_code,
      location_lat: lat,
      location_lng: lng,
      description: report.description,
      status: "ACTIVE",
      verification: "Reported by 1 student"
    }
    try {
      var result = await window.API.createAlert(payload)
      if (result && result.id) {
        sessionStorage.removeItem("v3-report")
        document.getElementById("success-overlay").style.display = "flex"
      } else {
        alert("Submission failed. Please try again.")
        btn.disabled = false
      }
    } catch(e) {
      alert("Network error. Please try again.")
      btn.disabled = false
    }
  })

  document.getElementById("success-ok").addEventListener("click", function() {
    window.location.href = "app.html"
  })
})
</script>
</body>
</html>
