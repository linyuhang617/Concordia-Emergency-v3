<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report — Concordia Safety</title>
<link rel="stylesheet" href="styles/ios.css">
<style>
.content {
  position: absolute;
  top: 52px;
  bottom: 0;
  left: 0; right: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 40px;
}
.large-title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: 0.37px;
  color: var(--label);
  padding: 16px 20px 4px;
}
.subtitle {
  font-size: 15px;
  color: var(--tertiary-label);
  padding: 0 20px 16px;
  letter-spacing: -0.24px;
}
.progress-wrap { padding: 12px 20px 0 }
.progress-track {
  height: 3px;
  background: var(--fill);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  width: 66.6%;
  background: var(--crimson);
  border-radius: 3px;
}
.step-label {
  font-size: 13px;
  color: var(--tertiary-label);
  padding: 6px 20px 4px;
  letter-spacing: -0.08px;
}

/* Form elements */
.form-select {
  width: 100%;
  border: none;
  outline: none;
  font-size: 17px;
  color: var(--label);
  letter-spacing: -0.41px;
  background: none;
  font-family: var(--sf);
  padding: 2px 0;
  -webkit-appearance: none;
}
.form-textarea {
  width: 100%;
  border: none;
  outline: none;
  font-size: 17px;
  color: var(--label);
  letter-spacing: -0.41px;
  background: none;
  font-family: var(--sf);
  resize: none;
  min-height: 80px;
  line-height: 1.4;
}
.form-textarea::placeholder,
.form-select option:first-child {
  color: rgba(60,60,67,0.3);
}
.detail-label {
  font-size: 13px;
  color: var(--tertiary-label);
  letter-spacing: -0.08px;
  margin-bottom: 4px;
}

/* Submit button */
.submit-btn {
  display: block;
  width: calc(100% - 32px);
  margin: 24px 16px 16px;
  padding: 16px;
  background: var(--crimson);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.41px;
  cursor: pointer;
  font-family: var(--sf);
}
.submit-btn:active { opacity: 0.8; transform: scale(0.98) }
.submit-btn:disabled { opacity: 0.4; cursor: default; transform: none }

/* Error */
.form-error {
  display: none;
  margin: 0 16px 8px;
  padding: 10px 14px;
  background: rgba(255,59,48,0.12);
  border-radius: 10px;
  font-size: 13px;
  color: var(--red);
  text-align: center;
  letter-spacing: -0.08px;
}
</style>
</head>
<body>
<div class="device" style="background:var(--bg)">

  <div class="nav-bar">
    <button class="nav-back" type="button" onclick="window.location.href='report.html'">
      <svg width="12" height="20" viewBox="0 0 12 20" fill="none"><path d="M10 2L2 10l8 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back
    </button>
    <span class="nav-title">Report</span>
  </div>

  <div class="content">
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill"></div></div>
    </div>
    <div class="step-label">Step 2 of 3</div>

    <div class="large-title" id="form-title">Details</div>
    <div class="subtitle" id="form-subtitle">Fill in the details about the hazard.</div>

    <div class="form-error" id="form-error"></div>

    <!-- Building -->
    <div class="group-header">Location</div>
    <div class="inset-group">
      <div class="list-row" style="cursor:default">
        <div class="row-body">
          <div class="detail-label">Building</div>
          <select class="form-select" id="building">
            <option value="">Choose a building...</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Description -->
    <div class="group-header">Description</div>
    <div class="inset-group">
      <div class="list-row" style="cursor:default;align-items:flex-start;min-height:100px">
        <div class="row-body">
          <textarea class="form-textarea" id="description" placeholder="Describe what you see..."></textarea>
        </div>
      </div>
    </div>

    <!-- Type-specific fields (hidden by default, shown based on type) -->
    <div id="extra-fields"></div>

    <button class="submit-btn" type="button" id="forward-btn">Forward →</button>
  </div>
</div>

<script src="scripts/api.js"></script>
<script src="scripts/auth.js"></script>
<script src="data/building.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async function() {
  await checkAuth()

  var params = new URLSearchParams(window.location.search)
  var type = params.get('type') || 'Others'

  document.getElementById('form-title').textContent = type
  document.getElementById('form-subtitle').textContent = 'Provide details about the ' + type.toLowerCase() + '.'

  // Populate building dropdown
  var select = document.getElementById('building')
  window.buildings.forEach(function(b) {
    var opt = document.createElement('option')
    opt.value = b.code
    opt.textContent = b.code + ' — ' + b.buildingName
    select.appendChild(opt)
  })

  // Type-specific extra fields
  var extra = document.getElementById('extra-fields')
  if (type === 'Protest') {
    extra.innerHTML =
      '<div class="group-header">Additional Info</div>' +
      '<div class="inset-group">' +
        '<div class="list-row" style="cursor:default">' +
          '<div class="row-body">' +
            '<div class="detail-label">Intensity Level</div>' +
            '<select class="form-select" id="intensity">' +
              '<option value="Low">Low — Small group</option>' +
              '<option value="Medium">Medium — Blocking some access</option>' +
              '<option value="High">High — Fully blocking entrance</option>' +
            '</select>' +
          '</div>' +
        '</div>' +
      '</div>'
  } else if (type === 'Elevator Malfunction') {
    extra.innerHTML =
      '<div class="group-header">Additional Info</div>' +
      '<div class="inset-group">' +
        '<div class="list-row" style="cursor:default">' +
          '<div class="row-body">' +
            '<div class="detail-label">Affected Floors</div>' +
            '<input class="field-input" type="text" id="floors" placeholder="e.g. 2-4" style="padding:8px 0">' +
          '</div>' +
        '</div>' +
      '</div>'
  }

  // Forward button
  document.getElementById('forward-btn').addEventListener('click', function() {
    var building = document.getElementById('building').value
    var description = document.getElementById('description').value.trim()
    var errorEl = document.getElementById('form-error')

    // Validation
    if (!building) {
      errorEl.textContent = 'Please choose a building.'
      errorEl.style.display = 'block'
      return
    }
    if (type === 'Others' && !description) {
      errorEl.textContent = 'Please enter a description.'
      errorEl.style.display = 'block'
      return
    }
    errorEl.style.display = 'none'

    // Build description with extra fields
    var descParts = []
    if (description) descParts.push(description)

    var intensityEl = document.getElementById('intensity')
    if (intensityEl) descParts.push('Intensity: ' + intensityEl.value)

    var floorsEl = document.getElementById('floors')
    if (floorsEl && floorsEl.value.trim()) descParts.push('Affected floors: ' + floorsEl.value.trim())

    var finalDesc = descParts.join(' | ') || 'No additional details'

    // Save to sessionStorage
    var report = {
      type: type,
      building_code: building,
      description: finalDesc
    }
    sessionStorage.setItem('v3-report', JSON.stringify(report))
    window.location.href = 'report-confirm.html'
  })
})
</script>
</body>
</html>
