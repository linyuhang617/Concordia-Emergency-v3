<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Concordia Emergency</title>
  <link rel="stylesheet" href="styles/web.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-icon">C</div>
      <h1>Concordia Emergency</h1>
      <p>Campus emergency reporting</p>
    </div>

    <div class="auth-error" id="error-msg"></div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="username" placeholder="Your username" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Required" autocomplete="current-password">
    </div>

    <button class="btn-primary" type="button" id="login-btn">Log In</button>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Sign Up</a>
    </div>

  </div>
</div>

<script src="scripts/api.js"></script>
<script>
if (localStorage.getItem('token')) {
  window.location.href = 'app.html'
}

function showError(msg) {
  const el = document.getElementById('error-msg')
  el.textContent = msg
  el.style.display = 'block'
}

function clearError() {
  document.getElementById('error-msg').style.display = 'none'
}

async function handleLogin() {
  clearError()
  const username = document.getElementById('username').value.trim()
  const password = document.getElementById('password').value

  if (!username || !password) {
    showError('Please enter username and password.')
    return
  }

  try {
    const result = await window.API.login({ username, password })

    if (result.detail || !result.token) {
      showError('Invalid username or password.')
      return
    }

    localStorage.setItem('token', result.token)
    window.location.href = 'app.html'
  } catch (e) {
    showError('Connection error. Is the server running?')
  }
}

document.getElementById('login-btn').addEventListener('click', handleLogin)

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin()
})
</script>
</body>
</html>
