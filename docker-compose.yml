services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: concordia
      POSTGRES_USER: concordia
      POSTGRES_PASSWORD: concordia_secret_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U concordia"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://concordia:concordia_secret_2026@db:5432/concordia
      JWT_SECRET: concordia-v3-jwt-secret-2026
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.concordia-api.rule=Host(`concordia-api.ailasai.com`)"
      - "traefik.http.routers.concordia-api.entrypoints=https"
      - "traefik.http.routers.concordia-api.tls=true"
      - "traefik.http.routers.concordia-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.concordia-api.loadbalancer.server.port=8013"
    networks:
      - default
      - coolify

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.concordia-fe.rule=Host(`concordia.ailasai.com`)"
      - "traefik.http.routers.concordia-fe.entrypoints=https"
      - "traefik.http.routers.concordia-fe.tls=true"
      - "traefik.http.routers.concordia-fe.tls.certresolver=letsencrypt"
      - "traefik.http.services.concordia-fe.loadbalancer.server.port=80"
    networks:
      - default
      - coolify

volumes:
  pgdata:

networks:
  coolify:
    external: true
