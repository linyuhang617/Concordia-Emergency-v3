services:
  backend:
    build: ./backend
    volumes:
      - db-data:/app
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./concordia.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
